name: All Builds (Linux, macOS, Windows, Android, IPA, APK, AAB)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: 3.12
  FLUTTER_VERSION: 3.22.2

jobs:

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: |
          export CI=true
          flutter config --no-analytics
          flutter doctor
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter pub get
          flet build linux --yes --build-number=$BUILD_NUMBER --build-version=$BUILD_VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux


  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: |
          export CI=true
          flutter config --no-analytics
          flutter doctor
          flutter pub get
          flet build macos --yes --build-number=$BUILD_NUMBER --build-version=$BUILD_VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/macos


  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: |
          flutter config --no-analytics
          flutter doctor
          flutter pub get
          flet build windows --yes --build-number=%BUILD_NUMBER% --build-version=%BUILD_VERSION%

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows


  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: |
          export CI=true
          flutter config --no-analytics
          flutter doctor
          flutter pub get
          flet build apk --yes --build-number=$BUILD_NUMBER --build-version=$BUILD_VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: build/apk


  build-aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: |
          export CI=true
          flutter config --no-analytics
          flutter doctor
          flutter pub get
          flet build aab --yes --build-number=$BUILD_NUMBER --build-version=$BUILD_VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: aab-build
          path: build/aab


  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: |
          export CI=true
          flutter config --no-analytics
          flutter doctor
          flutter pub get
          flet build ipa --yes --no-codesign --build-number=$BUILD_NUMBER --build-version=$BUILD_VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: ipa-build
          path: build/ipa
